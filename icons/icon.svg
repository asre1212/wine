<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/>
      <stop offset="1" stop-color="#EFE9DF"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a0e16"/>
      <stop offset="0.55" stop-color="#6b1f2a"/>
      <stop offset="1" stop-color="#2a070d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b08947"/>
      <stop offset="1" stop-color="#7a5b2c"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221015"/>
      <stop offset="1" stop-color="#100509"/>
    </linearGradient>
  </defs>

  <!-- Paper background -->
  <rect width="512" height="512" rx="96" fill="url(#paper)"/>

  <!-- Subtle paper grain via faint horizontal rule -->
  <line x1="64" y1="64" x2="448" y2="64" stroke="#8B6F3F" stroke-opacity="0.18" stroke-width="0.6"/>
  <line x1="64" y1="448" x2="448" y2="448" stroke="#8B6F3F" stroke-opacity="0.18" stroke-width="0.6"/>

  <!-- Soft shadow under bottle -->
  <ellipse cx="256" cy="448" rx="115" ry="11" fill="#6B1F2A" opacity="0.18"/>

  <!-- Bottle -->
  <g transform="translate(256 92) scale(0.78)">
    <!-- Cap -->
    <rect x="-30" y="0" width="60" height="58" rx="4" fill="url(#cap)"/>
    <rect x="-30" y="50" width="60" height="6" fill="#000" opacity="0.45"/>
    <!-- Body -->
    <path d="M-22 58 L-22 130 Q-22 142 -16 152 L-44 200 Q-72 245 -72 295 L-72 408 Q-72 436 -42 436 L42 436 Q72 436 72 408 L72 295 Q72 245 44 200 L16 152 Q22 142 22 130 L22 58 Z"
          fill="url(#bottle)" stroke="#1a050b" stroke-width="2.5"/>
    <!-- Glass highlight -->
    <path d="M-52 240 Q-60 300 -60 360 L-60 405 Q-60 425 -44 428 L-44 240 Z"
          fill="#fff" opacity="0.10"/>
    <!-- Label -->
    <rect x="-52" y="270" width="104" height="125" fill="#FBFAF7"/>
    <!-- Gold rules -->
    <line x1="-42" y1="288" x2="42" y2="288" stroke="url(#gold)" stroke-width="1.6"/>
    <line x1="-42" y1="376" x2="42" y2="376" stroke="url(#gold)" stroke-width="1.6"/>
    <!-- Wordmark in serif italic -->
    <text x="0" y="338" text-anchor="middle"
          font-family="ui-serif, 'New York', 'Hoefler Text', Georgia, serif"
          font-size="22" fill="#1A1816" font-style="italic" font-weight="400"
          letter-spacing="0.5">Cellar</text>
    <!-- Sub-line -->
    <text x="0" y="362" text-anchor="middle"
          font-family="-apple-system, system-ui, Helvetica, sans-serif"
          font-size="7.5" fill="#6C6863" letter-spacing="2.4" font-weight="500">EST · MMXXVI</text>
  </g>
</svg>
